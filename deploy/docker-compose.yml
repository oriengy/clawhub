# SkillHub 国内部署 - 单机 2C2G 方案
# 启动: docker compose --env-file .env up -d --build
services:
  # Convex 后端 (Rust, 核心服务)
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3210:3210"
      - "127.0.0.1:3211:3211"
    volumes:
      - convex-data:/convex/data
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - INSTANCE_NAME=skillbook
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN}
      - DO_NOT_REQUIRE_SSL=1
      - RUST_LOG=info
      - DISABLE_BEACON=true
      - DISABLE_METRICS_ENDPOINT=true
      - DOCUMENT_RETENTION_DELAY=172800
      - APPLICATION_MAX_CONCURRENT_MUTATIONS=8
      - APPLICATION_MAX_CONCURRENT_NODE_ACTIONS=8
      - APPLICATION_MAX_CONCURRENT_QUERIES=8
      - APPLICATION_MAX_CONCURRENT_V8_ACTIONS=8
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 15s

  # Convex 控制台
  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN}
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      backend:
        condition: service_healthy

  # 前端 SSR (TanStack Start + Nitro)
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_CONVEX_URL: ${CONVEX_CLOUD_ORIGIN}
        VITE_CONVEX_SITE_URL: ${CONVEX_SITE_ORIGIN}
        VITE_SITE_MODE: skills
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      backend:
        condition: service_healthy

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - dashboard

volumes:
  convex-data:
